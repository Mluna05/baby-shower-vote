<svg width="200" height="300" viewBox="0 0 200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Pampas grass decoration for right corner -->
  <g opacity="0.3">
    <!-- Stem 1 -->
    <path d="M 160 300 Q 165 250 160 200 Q 158 150 155 100 Q 153 50 150 20" stroke="#CBBBA5" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Plume 1 -->
    <ellipse cx="150" cy="15" rx="15" ry="35" fill="#CBBBA5" opacity="0.6"/>
    <ellipse cx="152" cy="18" rx="12" ry="30" fill="#E8DCC8" opacity="0.5"/>
    
    <!-- Stem 2 -->
    <path d="M 120 300 Q 122 250 125 200 Q 127 150 130 100 Q 132 50 135 25" stroke="#CBBBA5" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Plume 2 -->
    <ellipse cx="135" cy="20" rx="13" ry="32" fill="#CBBBA5" opacity="0.6"/>
    <ellipse cx="137" cy="23" rx="10" ry="28" fill="#E8DCC8" opacity="0.5"/>
    
    <!-- Stem 3 -->
    <path d="M 90 300 Q 95 250 98 200 Q 100 150 102 100 Q 104 50 106 30" stroke="#CBBBA5" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Plume 3 -->
    <ellipse cx="106" cy="25" rx="11" ry="28" fill="#CBBBA5" opacity="0.5"/>
    <ellipse cx="108" cy="28" rx="8" ry="24" fill="#E8DCC8" opacity="0.4"/>
    
    <!-- Decorative leaves -->
    <path d="M 155 150 Q 170 145 175 140" stroke="#B79B5B" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M 130 180 Q 145 175 152 170" stroke="#B79B5B" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M 100 120 Q 115 118 122 115" stroke="#B79B5B" stroke-width="1" fill="none" opacity="0.4"/>
  </g>
</svg>
